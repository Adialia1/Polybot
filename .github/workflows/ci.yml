name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Check for sensitive data
      run: |
        echo "Checking for potential secrets..."
        if grep -r "PRIVATE_KEY=0x[0-9a-f]\{64\}" --exclude-dir=node_modules --exclude-dir=.git .; then
          echo "❌ Found potential private key in code!"
          exit 1
        fi
        if grep -r "TELEGRAM_BOT_TOKEN=[0-9]" --exclude-dir=node_modules --exclude-dir=.git --exclude="*.md" .; then
          echo "❌ Found potential Telegram token in code!"
          exit 1
        fi
        echo "✅ No sensitive data found"

    - name: Verify .env is gitignored
      run: |
        if [ -f .env ]; then
          echo "❌ .env file should not be committed!"
          exit 1
        fi
        echo "✅ .env not in repository"

    - name: Check build artifacts
      run: |
        if [ ! -d "dist" ]; then
          echo "❌ Build failed - no dist directory"
          exit 1
        fi
        echo "✅ Build successful"

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check TypeScript
      run: npx tsc --noEmit

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true

    - name: Check for known vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '0'
