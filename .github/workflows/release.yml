name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Generate changelog
      id: changelog
      run: |
        # Get the previous tag
        PREV_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")

        if [ -z "$PREV_TAG" ]; then
          # First release
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --reverse)
        else
          # Subsequent releases
          CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --reverse)
        fi

        # Save to file
        echo "$CHANGELOG" > CHANGELOG.txt

        # Also save to output (escape newlines)
        {
          echo 'CHANGELOG<<EOF'
          echo "$CHANGELOG"
          echo EOF
        } >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## What's Changed

          ${{ steps.changelog.outputs.CHANGELOG }}

          ## Installation

          ```bash
          git clone https://github.com/${{ github.repository }}.git
          cd polybot
          git checkout v${{ steps.get_version.outputs.VERSION }}
          npm install
          cp .env.example .env
          # Edit .env with your credentials
          npm run bot
          ```

          ## Important Notes

          ⚠️ **Always start with `DRY_RUN=true`**

          See the [README](https://github.com/${{ github.repository }}/blob/v${{ steps.get_version.outputs.VERSION }}/README.md) for full documentation.
        draft: false
        prerelease: false
        files: |
          CHANGELOG.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Notify release
      run: |
        echo "✅ Release v${{ steps.get_version.outputs.VERSION }} published!"
        echo "https://github.com/${{ github.repository }}/releases/tag/v${{ steps.get_version.outputs.VERSION }}"
